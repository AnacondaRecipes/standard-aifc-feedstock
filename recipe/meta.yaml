{% set name = "standard-aifc" %}
{% set version = "3.13.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/standard_aifc-{{ version }}.tar.gz
  sha256: 64e249c7cb4b3daf2fdba4e95721f811bde8bdfc43ad9f936589b7bb2fae2e43

build:
  # Backport of the stdlib `aifc` module removed in Python 3.13; only needed on py>=3.13.
  skip: true  # [py<313]
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - setuptools >=61.0
    - pip
  run:
    - python
    - audioop-lts
    - standard-chunk

test:
  imports:
    - aifc
  commands:
    - pip check
  requires:
    - pip

about:
  summary: Standard library aifc redistribution. "dead battery".
  description: |
    The "aifc" module from the Python standard library, redistributed as a
    standalone package (a "dead battery") for Python 3.13+, where it was removed
    from the standard library by PEP 594.
  license: PSF-2.0
  license_family: PSF
  license_file: LICENSE
  home: https://github.com/youknowone/python-deadlib
  doc_url: https://github.com/youknowone/python-deadlib
  dev_url: https://github.com/youknowone/python-deadlib

extra:
  recipe-maintainers:
    - bmcfee
